# fly.toml app configuration file generated for masterliqours-api on 2026-06-03T18:10:30+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'masterliqours-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = 'https://masterliqours.my,https://www.masterliqours.my'
  PORT = '8001'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'
    protocol = 'http'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
